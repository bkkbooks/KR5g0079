front:
  text: 正一法文修真旨要吹五
  hash: sha256:f5bd29e2537a53c449bffd94fd6a0186c2e45a92411b50a0b3fe6eac3e3b68af
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0079_HFL_000-001a, image: hfl/1003/1003-004.png}
body:
  text: 服日月光芒法大方諸宫青童君常治處其上人皆天真高仙太極仙公上卿司命之所在也有服日月光芒法雖已得道爲真猶故服之直存心中有日象大如錢在心中赤色有九芒從心中上出喉至齒間即迴還胃中如此良久臨目存見心中胃中分明訖乃吐氣吐氣畢漱液三十九過止一日三爲之日出時食時午時行之一年疾病除五年身有光彩十八年得道成真日中行無影辟百邪千災之氣常存日在心月在泥丸中晝服日芒夜服月芒服月芒法如服日法存月有十芒白色從腦中下入喉芒亦至齒而咽入胃一云日芒常服月芒從月一日至十五日已前服十五日已後不服謂十五日已後月減光芒損天氣故言止也又云月一日至十五日已前服日十六日至月終服月也右此法方諸真人法出大智慧經中篇常能用之保見太平南極夫人所告行此法日在心月在泥丸之道爲省易得旨須勤行無令廢怠除身三尸百疾千惡萬邪是鍊魂制魄之道也日月常照形中則邪鬼無得藏形昔東海青童君傳授今故行之吾即其人也今以告子子服可密示有心者耳行此道亦不妨行寳書所以服日月法兼行有益也仙人一日一夕行千事不覺勞倦勤道之至重生不可失矣西城王君告楊君今以示諸許己上出真誥第三卷孟先生暮卧法山世遠受孟先生法暮卧先讀黄庭内景玉經一遍乃眠使人魂魄自然制鍊常行此法二十八年亦仙矣是合萬遍也夕得三四遍乃佳北嶽蔣夫人云讀此經年限未滿亦且使人無病是不死之道也出真誥第五惡夢吉夢祝太素真人教始學道者辟惡夢法若數遇惡夢者一曰魄祅二曰心試三曰尸賊此則厭消之方也若夢覺以左手掐人中二七過叩齒二七通開口以前齒啄之微呪曰大洞真玄長鍊三魂第一魂速守七魄第二魂速守泥丸第三魂守心節度速啓太素三元君某向遇不祥之夢是七魄遊尸來協萬邪之源急召桃康護命上告帝君五老九真各守體門黄闕神帥紫户將軍把鉞握鈴消滅惡津反凶成吉生死無縁畢又卧必獲吉應而造爲惡夢之氣即受閉於三關之下也三年之後唯神感應乃有夢也夢皆如見將來之明審也無復惡夢不祥之想矣若遇吉應好夢而心中自以爲佳則吉感也卧覺當摩目二七遍急閉目以手兩掌從内向外摩之叩齒二七而微呪曰太上高精三帝丹靈絳宫明徹吉感告情三元柔魄天皇授經所向諧合飛仙上清常與玉真俱會紫庭畢此大洞祕訣以傳於世始涉津流者矣右出大丹隱書山源者是鼻下人中之左側鼻下尖谷中也旦日中暮常咽液三九過急以左手第二第三指按之三九下急按爲痛按非急速之急也按了密呪曰開通天庭使我長生徹視萬里魂魄反嬰滅鬼却魔來致千靈上昇太上與日合并得補真人列象玄名一日三遍行之此法常爲人致靈徹視杜遏萬邪之道也明耳目訣真誥曰求道之要先令耳聰目明爲事主也且耳目是尋真之梯級綜靈之門户得失繫之而立存亡須之而辯也今抄經相示可施用也道曰常以手按兩眉後小穴中三九過又以手心及指摩兩目顴上以手旋耳行三十過唯令數無時節也畢輙以手逆乘額三九過從眉中爲始乃入髮際中口嚥液多少無數也如此常行耳目聰明二年可夜書眉後小穴爲上元六合之府主化生眼暉和瑩精光長珠徹瞳保鍊目神是真人坐起之上道也一名曰真人常居内經真諺曰子欲夜書常修起居真人所以能旁觀四達使八遐照朗者實常居之數明也青牛道士存日月訣青牛道士口訣曰暮卧時存日在額上月在臍上辟千鬼萬邪致玉童玉女來降萬禍伏走祕驗青牛道士即封君違也出神仙傳五嶽序沈義口訣曰服神藥勿向北方大忌也亥子日不可唾正北方亡精失氣减損年命藥力如土深可忌之欒巴口訣行經山野及諸靈廟惡神祠字存口中有真人字赤靈丈人侍以玉女二人一女名華正一女名攝精丈人薯赤羅袍玉女二人上下黄衣所存畢乃叱咤曰廟中鬼神速來使百邪詣赤靈丈人受斬死衆邪却走千里此是三天前驅使者捕鬼之法也服食忌并治病法女仙程偉妻口訣曰勿食血物食血物使不得去三尸乾肉猶可耳鳳剛口訣曰道士有疾當閉目内視心使生火以燒身及疾處存之使精如髣髴病即愈於痛處存加其火祕驗出神仙傳序元氣真人曰服胎息内氣者長生之術也陰符曰人無術命不長又曰經冬之草覆之即不傷故知攝生之道莫過乎元氣所以禽蟲蟄藏不食而全者蓋息得其氣也天生萬物唯人最靈百穀所以飴焉元氣所以播焉人能將正性而合元氣少思寡欲去智離形然後可以示之熊經鳥申龜息鶴舞非其人切祕之故序其法列之於後服氣訣凡服氣先偃卧閉口鼓顋腹令氣滿口即嚥嚥時作意蹙向後吞之如食入喉喉有三道一道氣從藏中出至口微出鼻令滿口於其出息蹙斷便嚥嚥分爲二道津液存入兩腎氣存入腸胃也若上熱下冷即先服暖氣若下熱上冷即先服冷氣暖氣者從五藏中出鼓於口久令氣在口暖極熱嚥此謂暖氣也若氣液滿於口便蹙嚥下者此名爲冷氣也亦云秋冬冝服暖氣春夏冝服冷氣亦云於人體自候臟腑冷熱而服也初則仰卧得便之後無問行住坐卧並得也鼓氣之時牙齒須開嚥時牙齒須閉令相著若不相著嚥液及氣不入久服之後合口即氣自然下入腸胃嚥亦不費功夫若不得法元氣不下所覺嚥入者但少津液若蹙氣時合牙齒相著復不須起顋口中既不開通氣反從鼻出雖嚥無益須精審之凡服氣候五更食消盡則服之至食時乃忘饑忘饑得力得力之後覺饑則服氣腹中或鳴若腹中氣相續則不鳴若腹中空氣入即鳴亦無苦也服氣得力則决定勿食不斷食亦隨人所樂也凡服日月精華者即須皆早朝及夜半生氣時仍須天氣晴明只如内氣但覺腹空即服不限時節及行住坐卧也亦不論日服幾度也初服氣至一七日或五日有三兩行痢痢中或沫無沫小便赤色亦不須怪其中初服以臍下澁悶不須疑怪悶時燌和香於靜室暫絶人喧寬衣帶從容四體仰卧小小閉氣想氣從五藏中對兩腎下貼著脊有二穴氣色白分爲二道從穴夾脊上至頭想氣至髮熠熠良久想氣廻至面下入五藏又下至三星三星人陰也然後下至脚湧泉了即以兩手心摩腹三二十轉及臍下百轉了從容四大卧少時自然舒暢向來之悶都除也洞微昔受訣於師其用心之中更自調適無不效也人之使手不如使意意者與氣合一意之所至氣無不應洞微少小多疾或淋或瘠勞病之候至多自得氣術疾都覺愈七日已前少有變動如前說十日已後勤爲自然通流方得安穩亦須時時量事一兩服導引服氣常莫使欠似不相續即服之服多或時噫氣下泄亦非異事耳凡服氣後至七日或二七日或久遠逢食及酒並喫無妨酒不得過度亂正氣若食飽不須服氣食盡則服若不解服氣唯學存思及以藥絶穀則未能久免飢渴後忽食便死所以然者腸胃乾澁及九竅不通所以至死若服氣之人食無妨者以腹中腸胃先開故能受食如渴飲湯水用津液潤之並得取津液以舌拄上齶及舌下左右轉則津液悉集凡服氣之人先須内無攀縁心與道契然後服之諸病易愈如覺四體不調存想病處以氣攻之即愈道成之後永無疾病日覺輕健可涉遠行如經歷腥穢葷辛之處雖不耐亦無損能閉坐焚香清凈避外穢尤佳若以氣斷穀見食心欲者此乃執心不一以致猶豫如一向决定唯服元氣爲事久後見食亦無欲相凡服氣道成亦勝用藥絶穀畢竟體虚服氣至妙久竟湯酒之類亦自不須大小便並絶若志士有公務未能專一在道服元和正氣餘暇每一二時服三五十嚥令腹中常有元氣在氣海中忽有疾須用導引引出攻疾立效自驗可知凡服氣雖服内氣亦須外氣外氣者日月之精華也早朝室中服青氣也黄庭云日月之光救老殘此之謂也服元氣者非用時節不論朝暮得服則服日月精華者候天氣晴和日初出一丈已上高並可服向日拱手四揖閉目存日中一道光芒紫色如線來至鼻口想令滿口中赤光色嚥三九嚥止又四揖若唯只服内氣不佳能兼服生氣生氣者則此也生氣既服與元氣合一也攻病速愈若唯服内氣攻病者稍遲差也若然兼日月精華久服令人身靈及有光彩也閉氣攻病易行而速愈其法於靜室中正卧有和香即燒尤佳無亦得也寬衣帶放身縱體握固徐徐長吐細氣出口兩三度以鼻引氣入口密閉口用心念所患處如漏漏相續注之滿十又從一起如是十十爲百小縮氣若身彊無力還閉目吐細氣五息然後起夫閉氣攻病令體中極熱汗出通流即差都無患者但放氣通行開其關節胑體皮毛孔中悉令氣出如似煙霧或似甑中氣也久久自見若頭中有疾以手捻塞鼻孔以氣攻之即愈但知人服内元氣不知服生氣生氣者日月精華及早朝東青氣也故元氣在脾中藉生氣以相生也導引法凡覺身體昏沈不通暢即導引十九法第一兩手更相扭捩如洗手狀第二兩手淺叉翻覆向胷第三兩手相捉共按䏶上左右同第四兩手相叉叉重按左右䏶徐徐拔身左右同第五如挽一石弓餘力左右同第六作拳向前築左右同第七如拓千斤之石左右同第八以拳却頓此名開胷左右同第九大坐斜身偏倚如排山左右同第十兩手抱頭宛轉腦上此名開脅左右同第十一兩手據地縮身曲脊向上三舉之第十二兩手反槌背上左右同第十三大坐伸脚用手相叉反掣第十四兩手據地左右顧盻此名虎視左右第十五立地反拗身向後三舉之第十六兩手急相叉以脚踏手中左右摇左右脚更爲之第十七起立以脚前後踏左右同第十八正坐伸脚當心兩手勾脚上著膝上以手按左右第十九手直上指天直下指地左右同右十九勢每日為之補益延年無病若不能盡為之於中取好者常効一兩般則血液通流無病當為之時勿當風仍須閉氣每一服了須吐故氣不令耳聞也察候四大四大和調生之徒不調病之徒當以唇口察之冷爲風增熱爲火增澁爲地增滑爲水增聲爲風增動爲喘增痒爲氣增不聲不喘爲調和或從外起或從内起由寒熱勞逸飽實饑虚爲外起由名利喜怒聲色思營爲内起宜以口吐氣以鼻納氣其吐納不急不速自然綿綿而已其出氣有六種所療各異若冷以吹吐之若熱以呵吐之若風痛以嘻吐之若上氣以呼吐之若痰稍滿以噓吐之若熱勞倦以呬吐之心藏中病若冷則吹氣若熱則呼氣出之候夜夢見赤衣人持刀杖或持火來怖人也肺藏病遍身胷臆四肢煩疼宜噓氣出之候夢見美男女詐來親附或云兄弟妻子也肝藏病者憂愁不樂悲思嗔喜頭目煩疼宜呼氣出之候夢見青衣人持青刀杖來怖人或作獅子虎狼種種怖人也脾藏病面上遊風習習遍身痒悶疼痛宜嘻氣出之候夢見小兒擊礫惱人擲物打人或作旋風繞人也腎藏病咽喉駐塞腹滿耳聾宜呬氣出之候夢見有物黤黯無頭面噎覆人也右諸所攝養皆須調和氣息每以人定靜時寬衣大坐背倚軟物緩衣解帶放縱身體應念性情平等死生無二欲使心平心平則氣調無損故曰能不以生為生者是乃真於養生也察候形色夫置鏡者所以自鑒形色也形色若變則退居靜室治黄庭經集身神拘三魂制七魄步七元服元氣也夫人形之所存者氣也氣之所依者形也氣全則形全氣竭則形斃鍊形保氣可以保其生也未有有形而無氣也未有有氣而無形也形之與氣相須而成豈非自然乎凡人赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽黄欲如羅裏雄黄不欲如黄土黑欲如重漆色不欲如地蒼青欲如蒼璧之澤不欲如藍凡青色如草滋黑如炱黄如枳實赤如衃血白如枯骨此五者並爲死人之狀也若青如翠羽黑如鳥羽赤如雞冠黄如蟹腹白如豚膏此五者並爲生人之狀也病人易差可醫也凡病人兩目黄色起者立愈病人面目俱赤者愈病人面赤目青者死面黑目青者不死面黑目赤者不死病人兩頰顴赤團而不散者死病人及健人色變如馬肝望之如青近之如黑者死病人口如不能開而氣出者死病人足腫兩膝頭大如斗者死病人妄語錯亂者死熱病不死病人背青人中反者死病人面黄目青者死病人面青目無精光齒黑者死髮乾如麻耳聾者死病人絶不言喉中作聲者死舌卷縮者死髮直多怒者死鬚眉衝起者死面白目白者死面青唇黑者死陰囊腫者死又目匡陷者死病人有五絶肝絶者目直視而脫光目無所見心絶者不欲見人言語錯亂舌卷不能言脾絶者食肉㬷破鼻虚張而唇褰肺絶者面白而聲嘶皮急毛焦鼻柱開腎絶者髮直耳焦無所聞也五藏相乘肝病皮黑目白肺之乘肝死於秋日入時心病目黑舌黑腎之乘心死於冬夜半時脾病唇青肝之乘脾死於春平旦時肺病兩頰顴赤目腫心之乘肺死於夏日午時腎病面腫唇黄脾之乘腎死於四季月午後時察候日肝絶者目脫光無所見八日死心絶者一日死汗出如珠滯而不流一日死脾絶者食肉㬷破唇褰十二日死肺絶者失聲三日死腎絶者耳焦髮直無所聞四日死行禁治病夫道法救人疾厄至於察候不可不知欲行禁治病預令病人家早期天氣晴和盛潔室宇絶喧靜寂道士到病人邊焚香子細察病人神氣若形候惡不堪治亦須爲存神行氣加治下三下印至日中又往察神氣微變吉否若未迴又須一下禁夜間又須候變否若未變又須下禁至明日早朝往候神色不變此命盡不可治也夫治病且須輕財道有拯救之心神靈必祐真氣必應若動則心冀於財無拯救之心所行無効禍反剋身道法符禁救人疾苦須頻令道士講論三十六部尊經敷揚玄聖符禁等法並量性分習學洞微今謹依正一神仙三五祕訣修行符禁之術具列如後十二辰三五大會顯幽冥禁訣者道家呪術妙法多端萬流淵隱難悉兼通若拯救危命莫先於印昔範蠡行之乃使山嶽崩頽河海遏流神威所懾雷霆戢響可以鑠金磨玉還氣復魂況於療病者乎但凡夫淺蔽玄術難精所以今世修人多有不効良由學不研審或心不專至也李道化曰余不以踈懵少習此法印之難明在於存思若能精其呼吸明其度數則存思了然神明備矣爾乃冠蓋帶五神步乾元亨利貞必能爾者罕有不愈也今聊將管識略圖其次序以示同學未能窮其要契者也七行氣法先須噴水解穢左手執水椀右手執劒劒水相向背建向破存面前有一真官朱衣身長一丈九尺頭戴籙中九鳳冠口含水向前噴病人室宇焕赫如朝霞了以劒水相向存七星斗在我頭上罡在水椀中呪曰謹請北斗七星之精降此水中百殗之鬼速去萬里不去斬死付西方白童子急急如律令五方各噴次噴病人行印去病人一丈左手捻都監目右手執印當心向王立第一先存我神頭戴天足拄地五色雲氣覆我身第二思五星在頭上各在方位去頭一尺第三存面前左日右月去面九寸第四存頭上朱雀左青龍右白虎足下八卦神龜行印玉童玉女侍衛左右第五存思五色真氣大如絲從五藏中出口去頭高一丈八尺迴繞頭三帀次思肝中三人青衣青幘出立左心中三人赤衣赤幘立前肺中三人白衣白幘立右腎中三人黑衣黑幘立後脾中三人黄衣黄幘在丙地立並左手持劒鑲右手持鉞斧次存見我頭上七星罡頭指病人痛處次存向來頭戴九鳳冠真官乘太陽赤氣禹步持印印病人心一下次印腹一下次印痛處一下想見毒氣奔散而岀了然次存我身極閉氣禹步九跡到病人所立未印先口吸病人三吸三咤三叱次鳴天鐘六下叩天磬六下召則用鐘伏則用磬次呪印曰天帝神印印山成湖印石成塗印樹樹枯印地地裂印木木折印火火滅印水水絶印上徹下印表徹裏印前徹後印左徹右印邪邪亡印痛痛止印病病散印鬼鬼走破除癥結流殃咎注急自走去正神安汝處急急如太上老君律令便下印須閉氣良久了然後舉印退後又祝曰男女生某乙年若干歲某月日時生今身患某疾病請臣救治臣謹上請三部大將軍行印將軍治病將軍破邪將軍收魔將軍並請隨印治病救某人身中疾病急急出叱吾今以黄神越章之印印心從心出印腹從腹出印肝從肝出印肺從肺出印腎從腎出印脾從脾出印頭從頭出印背從背出印胷從胷出印腰從腰出印手從手出印足從足出速出速出急急如律令印下又誦一遍然後舉印又把印當心呪曰南方之鬼北方之鬼東方之鬼西方之鬼中央之鬼天鬼地鬼神鬼男鬼女鬼沈尸毒注之鬼當印者死值印者亡速出速出下印又誦兩遍然後舉印印令病人吞三二道符男服三符女服二符夫行禁治病存想皆存十方真氣行禁欲行先約束病人三日斷五辛十二辰肉但一切蟹肉酒魚腥之屬並禁唯通些些乾鹿脯能如此方可爲下印若不能如此反損無益用印了以香湯浴印用新帛乾拭入匣中盛之此印不得將入喪家産婦家及血腥六畜胎乳殗穢之處並不得將往也若卒有夜夢驚怖音聲震響動不如常者即起大呼曰宅中七神司命竈君何以令非常之鬼干犯黄帝子孫𠬧捕之付獄吏治罪言訖將印掛户上還卧須臾自聞鞭罰之聲若人卒中蜚惡尸鬼疰悶絶不止心痛印心上立止若人鬼語不止印之如法即止若人路行或入山野過江渡湖或見狼虎熊羆之屬及侵害六畜以印印其跡虎走三十里乃止逆印即來趣人若水中蛟龍魚龜蟲獸蛇毒之類害人者以凈黄土爲泥印封之投入水中即死若奴婢逃走即印其跡則還若人卒中惡氣或死不知者或行肢體中如錐刀刺者以印閉氣按其痛上及心上呪曰邪氣去正氣住正一法文修真旨要
